<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海青菜品应用研发工作台</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#0f766e;--primary-light:#14b8a6;--primary-dark:#0d5f59;
    --accent:#f59e0b;--accent-light:#fbbf24;
    --bg:#f0fdfa;--bg-card:#ffffff;--bg-dark:#042f2e;
    --text:#1e293b;--text-light:#64748b;--text-white:#f0fdfa;
    --border:#e2e8f0;--shadow:0 4px 24px rgba(15,118,110,.08);
    --radius:16px;--radius-sm:10px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  /* 顶部导航 */
  .navbar{background:linear-gradient(135deg,var(--bg-dark) 0%,#0a3d3a 100%);padding:0 32px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.15)}
  .nav-brand{display:flex;align-items:center;gap:14px}
  .nav-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--primary-light),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700}
  .nav-title{color:#fff;font-size:20px;font-weight:700;letter-spacing:1px}
  .nav-subtitle{color:rgba(240,253,250,.6);font-size:12px;margin-top:2px}
  .nav-tabs{display:flex;gap:6px}
  .nav-tab{padding:10px 24px;border-radius:var(--radius-sm);color:rgba(240,253,250,.7);font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;border:none;background:transparent;text-decoration:none}
  .nav-tab:hover{color:#fff;background:rgba(255,255,255,.08)}
  .nav-tab.active{color:#fff;background:var(--primary);font-weight:600}

  /* 主容器 */
  .container{max-width:1400px;margin:0 auto;padding:28px 32px}

  /* 卡片 */
  .card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(15,118,110,.06);overflow:hidden;transition:transform .2s,box-shadow .2s}
  .card:hover{box-shadow:0 8px 32px rgba(15,118,110,.12)}
  .card-header{padding:22px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-header-left{display:flex;align-items:center;gap:12px}
  .card-icon{width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px}
  .card-icon.insight{background:linear-gradient(135deg,#dbeafe,#bfdbfe);color:#2563eb}
  .card-icon.dish{background:linear-gradient(135deg,#fef3c7,#fde68a);color:#d97706}
  .card-title{font-size:17px;font-weight:700;color:var(--text)}
  .card-body{padding:24px 28px}

  /* 双栏布局 */
  .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:4px}

  /* 平台标签 */
  .platform-tabs{display:flex;gap:4px;background:#f1f5f9;padding:4px;border-radius:var(--radius-sm)}
  .platform-tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;color:var(--text-light);cursor:pointer;transition:all .2s;border:none;background:transparent}
  .platform-tab:hover{color:var(--text)}
  .platform-tab.active{background:#fff;color:var(--primary);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.06)}

  /* 刷新按钮 */
  .btn{padding:9px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,118,110,.25)}
  .btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
  .btn-outline:hover{background:rgba(15,118,110,.05)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-accent:hover{background:#d97706;transform:translateY(-1px)}

  /* 洞察列表 */
  .insight-list{display:flex;flex-direction:column;gap:12px;margin-top:16px}
  .insight-item{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:linear-gradient(135deg,#f0fdfa,#f8fafc);border-radius:var(--radius-sm);border:1px solid rgba(15,118,110,.08);transition:all .2s}
  .insight-item:hover{border-color:var(--primary-light);transform:translateX(4px)}
  .insight-rank{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
  .insight-content{flex:1}
  .insight-keyword{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
  .insight-desc{font-size:13px;color:var(--text-light);line-height:1.5}
  .insight-source{display:inline-block;margin-top:6px;padding:2px 10px;background:#dbeafe;color:#2563eb;border-radius:20px;font-size:11px;font-weight:500}

  /* 暂无数据 */
  .empty-state{text-align:center;padding:48px 20px;color:var(--text-light)}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
  .empty-text{font-size:14px}

  /* 加载 */
  .loading{text-align:center;padding:40px;color:var(--text-light);font-size:14px}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* 表单 */
  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
  .form-label .required{color:#ef4444;margin-left:2px}
  .form-input,.form-textarea{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:#fff;transition:all .2s;outline:none;font-family:inherit}
  .form-input:focus,.form-textarea:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
  .form-textarea{resize:vertical;min-height:90px;line-height:1.6}
  .form-input::placeholder,.form-textarea::placeholder{color:#94a3b8}

  /* 辅料动态列表 */
  .side-list{display:flex;flex-direction:column;gap:8px}
  .side-row{display:flex;gap:8px;align-items:center}
  .side-row .form-input{flex:1}
  .btn-remove{width:32px;height:32px;border-radius:8px;border:1.5px solid #fecaca;background:#fef2f2;color:#ef4444;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .btn-remove:hover{background:#ef4444;color:#fff}
  .btn-add{padding:8px 16px;border-radius:8px;border:1.5px dashed var(--primary-light);background:transparent;color:var(--primary);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
  .btn-add:hover{background:rgba(15,118,110,.05);border-color:var(--primary)}

  /* 生成结果 */
  .result-section{margin-top:24px;padding-top:24px;border-top:1px solid var(--border)}
  .result-image{text-align:center;margin-bottom:20px}
  .result-image img{max-width:100%;max-height:360px;border-radius:var(--radius);box-shadow:0 4px 20px rgba(0,0,0,.1)}
  .result-points{display:flex;flex-direction:column;gap:10px}
  .point-item{padding:12px 16px;background:linear-gradient(135deg,#f0fdfa,#ecfdf5);border-radius:var(--radius-sm);border-left:3px solid var(--primary-light);font-size:14px;line-height:1.6;color:var(--text)}
  .point-icon{margin-right:6px}

  /* 响应式 */
  @media(max-width:900px){
    .main-grid{grid-template-columns:1fr}
    .navbar{padding:0 16px;height:64px}
    .container{padding:20px 16px}
    .nav-subtitle{display:none}
  }
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">🐟</div>
    <div>
      <div class="nav-title">海青菜品研发工作台</div>
      <div class="nav-subtitle">大连海青水产有限公司 · 深海鱼加工及预制菜品研发</div>
    </div>
  </div>
  <div class="nav-tabs">
    <a class="nav-tab active" href="/">菜品研发</a>
    <a class="nav-tab" href="/product.html">产品研发</a>
  </div>
</nav>

<!-- 主内容 -->
<div class="container">
  <div class="main-grid">

    <!-- 左：社媒洞察 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-icon insight">📊</div>
          <div class="card-title">社媒洞察</div>
        </div>
        <button class="btn btn-outline" onclick="fetchInsights()">🔄 刷新数据</button>
      </div>
      <div class="card-body">
        <div class="platform-tabs" id="platformTabs">
          <button class="platform-tab active" data-platform="dianping">大众点评</button>
          <button class="platform-tab" data-platform="xiaohongshu">小红书</button>
          <button class="platform-tab" data-platform="douyin">抖音</button>
          <button class="platform-tab" data-platform="meituan">美团</button>
        </div>
        <div id="insightContent">
          <div class="empty-state">
            <div class="empty-icon">📈</div>
            <div class="empty-text">点击「刷新数据」获取社媒洞察</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右：菜品研发 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-icon dish">🍳</div>
          <div class="card-title">菜品研发</div>
        </div>
      </div>
      <div class="card-body">
        <form id="dishForm" onsubmit="generateDish(event)">
          <div class="form-group">
            <label class="form-label">菜品名称<span class="required">*</span></label>
            <input class="form-input" id="dishName" placeholder="例如：香煎鳕鱼" required>
          </div>
          <div class="form-group">
            <label class="form-label">主料及克重<span class="required">*</span></label>
            <input class="form-input" id="mainIngredient" placeholder="例如：鳕鱼200g" required>
          </div>
          <div class="form-group">
            <label class="form-label">辅料及克重</label>
            <div class="side-list" id="sideList">
              <div class="side-row">
                <input class="form-input" placeholder="例如：黄油20g">
                <button type="button" class="btn-remove" onclick="removeSide(this)">×</button>
              </div>
            </div>
            <button type="button" class="btn-add" onclick="addSide()" style="margin-top:8px">+ 添加辅料</button>
          </div>
          <div class="form-group">
            <label class="form-label">烹饪方法<span class="required">*</span></label>
            <textarea class="form-textarea" id="cookingMethod" placeholder="例如：鳕鱼解冻，放入锅内香煎至两面金黄" required></textarea>
          </div>
          <button type="submit" class="btn btn-accent" style="width:100%;justify-content:center;padding:13px;font-size:15px">
            🎨 生成菜品图片和卖点
          </button>
        </form>
        <div id="dishResult"></div>
      </div>
    </div>

  </div>
</div>

<script>
const API_BASE = "https://haiqing-dish-rnd-production.up.railway.app";
let currentPlatform = "dianping";

// 平台标签切换
document.querySelectorAll('.platform-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentPlatform = this.dataset.platform;
    fetchInsights();
  });
});

// 获取社媒洞察
async function fetchInsights() {
  const container = document.getElementById('insightContent');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><br>正在获取数据...</div>';

  try {
    const resp = await fetch(`${API_BASE}/api/web/insights/${currentPlatform}`);
    const data = await resp.json();

    if (data.success && data.insights && data.insights.length > 0) {
      container.innerHTML = '<div class="insight-list">' +
        data.insights.map((item, i) => `
          <div class="insight-item">
            <div class="insight-rank">${i + 1}</div>
            <div class="insight-content">
              <div class="insight-keyword">${item.keyword}</div>
              <div class="insight-desc">${item.description}</div>
              <span class="insight-source">${item.source || currentPlatform}</span>
            </div>
          </div>
        `).join('') + '</div>';
    } else {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无数据</div></div>';
    }
  } catch (e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">获取数据失败，请检查网络连接</div></div>';
  }
}

// 添加辅料
function addSide() {
  const list = document.getElementById('sideList');
  const row = document.createElement('div');
  row.className = 'side-row';
  row.innerHTML = '<input class="form-input" placeholder="例如：柠檬汁10ml"><button type="button" class="btn-remove" onclick="removeSide(this)">×</button>';
  list.appendChild(row);
}

// 删除辅料
function removeSide(btn) {
  const list = document.getElementById('sideList');
  if (list.children.length > 1) {
    btn.parentElement.remove();
  }
}

// 生成菜品
async function generateDish(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  const resultDiv = document.getElementById('dishResult');
  btn.disabled = true;
  btn.textContent = '⏳ 生成中...';
  resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><br>AI正在生成菜品图片和卖点，请稍候...</div>';

  const dishName = document.getElementById('dishName').value;
  const mainIngredient = document.getElementById('mainIngredient').value;
  const cookingMethod = document.getElementById('cookingMethod').value;

  // 收集辅料
  const sideInputs = document.querySelectorAll('#sideList .form-input');
  const sideIngredient = Array.from(sideInputs).map(input => input.value).filter(v => v.trim()).join('、');

  try {
    const resp = await fetch(`${API_BASE}/api/web/dish/generate`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        dish_name: dishName,
        main_ingredient: mainIngredient,
        side_ingredient: sideIngredient,
        cooking_method: cookingMethod
      })
    });
    const data = await resp.json();

    if (data.success) {
      let html = '<div class="result-section">';
      if (data.image_url) {
        html += `<div class="result-image"><img src="${data.image_url}" alt="${dishName}" onerror="this.style.display='none'"></div>`;
      }
      if (data.selling_points && data.selling_points.length > 0) {
        html += '<div class="result-points">' +
          data.selling_points.map(p => `<div class="point-item"><span class="point-icon">✨</span>${p}</div>`).join('') +
          '</div>';
      }
      html += '</div>';
      resultDiv.innerHTML = html;
    } else {
      resultDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">生成失败，请重试</div></div>';
    }
  } catch (err) {
    resultDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">网络错误，请重试</div></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '🎨 生成菜品图片和卖点';
  }
}

// 页面加载自动获取洞察
window.addEventListener('load', () => { fetchInsights(); });
</script>
</body>
</html>
