<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品研发 - 海青水产</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Noto Sans SC', sans-serif; }
        .ocean-gradient { background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 50%, #0ea5e9 100%); }
        .card-shadow { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .btn-primary { background: linear-gradient(135deg, #0ea5e9, #0284c7); transition: all 0.3s; }
        .btn-primary:hover { background: linear-gradient(135deg, #38bdf8, #0ea5e9); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14,165,233,0.4); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-danger:hover { background: linear-gradient(135deg, #f87171, #ef4444); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-success:hover { background: linear-gradient(135deg, #34d399, #10b981); }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-warning:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .tab-active { background: white; color: #0c4a6e; font-weight: 600; }
        .tab-inactive { color: rgba(255,255,255,0.7); }
        .tab-inactive:hover { color: white; background: rgba(255,255,255,0.1); }
        .product-item { transition: all 0.2s; }
        .product-item:hover { background: #f0f9ff; }
        .improvement-card { border-left: 3px solid #0ea5e9; }
        .slide-in { animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- 顶部导航 -->
<nav class="ocean-gradient text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-xl">🐟</div>
            <div>
                <h1 class="text-lg font-bold leading-tight">菜品应用研发工作台</h1>
                <p class="text-xs text-sky-200">大连海青水产 · 深海鱼加工及预制菜品研发</p>
            </div>
        </div>
        <div class="flex gap-1 bg-white/10 rounded-xl p-1">
            <a href="index.html" class="tab-inactive px-4 py-2 rounded-lg text-sm">菜品研发</a>
            <a href="product.html" class="tab-active px-4 py-2 rounded-lg text-sm">产品研发</a>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- 左侧：已保存产品列表 -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl card-shadow overflow-hidden">
                <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-box text-sky-500"></i>
                        <h2 class="font-semibold text-gray-800">产品列表</h2>
                        <span id="productCount" class="text-xs bg-sky-50 text-sky-600 px-2 py-0.5 rounded-full">0</span>
                    </div>
                    <button onclick="showProductForm()" class="btn-primary text-white text-xs px-3 py-1.5 rounded-lg">
                        <i class="fas fa-plus mr-1"></i>新建
                    </button>
                </div>
                <div id="productList" class="divide-y divide-gray-50 max-h-[calc(100vh-200px)] overflow-y-auto">
                    <div class="text-center text-gray-400 py-8">暂无产品</div>
                </div>
            </div>
        </div>

        <!-- 右侧：产品录入/编辑 -->
        <div class="lg:col-span-2 space-y-6">
            <!-- 表单 -->
            <div id="productFormPanel" class="bg-white rounded-2xl card-shadow overflow-hidden slide-in">
                <div class="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-flask text-sky-500"></i>
                        <h2 class="font-semibold text-gray-800" id="formTitle">新建产品</h2>
                    </div>
                    <div id="formActions" class="flex gap-2">
                        <button onclick="saveProduct()" class="btn-success text-white text-xs px-3 py-1.5 rounded-lg"><i class="fas fa-save mr-1"></i>保存</button>
                    </div>
                </div>
                <div class="p-5">
                    <input type="hidden" id="editProductId" value="">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">产品名称 <span class="text-red-500">*</span></label>
                            <input type="text" id="productName" placeholder="例如：香煎鳕鱼预制菜" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">配方名称</label>
                            <input type="text" id="recipeName" placeholder="关联配方名称" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">烹饪工艺</label>
                            <input type="text" id="cookingMethod" placeholder="例如：真空低温慢煮" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">状态</label>
                            <select id="productStatus" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
                                <option value="draft">草稿</option>
                                <option value="testing">测试中</option>
                                <option value="published">已发布</option>
                            </select>
                        </div>
                    </div>
                    <!-- 原料列表 -->
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">原料配方</label>
                        <div id="ingredientsList" class="space-y-2"></div>
                        <button onclick="addIngredient()" class="mt-2 text-sm text-sky-600 hover:text-sky-700"><i class="fas fa-plus mr-1"></i>添加原料</button>
                    </div>
                    <!-- 实验室数据 -->
                    <div class="mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">实验室数据</label>
                        <textarea id="labData" rows="3" placeholder="记录实验参数、检测结果等..." class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm"></textarea>
                    </div>
                    <!-- 操作按钮 -->
                    <div class="mt-5 flex gap-3 flex-wrap">
                        <button onclick="analyzeProduct()" id="analyzeBtn" class="btn-primary text-white px-5 py-2.5 rounded-xl text-sm font-medium">
                            <i class="fas fa-brain mr-2"></i>AI分析优化建议
                        </button>
                    </div>
                    <!-- AI分析结果 -->
                    <div id="analyzeResult" class="mt-6 hidden fade-in">
                        <div class="border-t border-gray-100 pt-5">
                            <h4 class="text-sm font-semibold text-gray-700 mb-3"><i class="fas fa-lightbulb text-amber-400 mr-1"></i>AI优化建议</h4>
                            <div id="improvementsList" class="space-y-3"></div>
                            <div id="summaryBox" class="mt-4 bg-sky-50 rounded-xl p-4 text-sm text-gray-700"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = "https://haiqing-dish-rnd-production.up.railway.app";
let ingredientCount = 0;
let currentImprovements = [];
let currentSummary = '';

// ========== 原料管理 ==========
function addIngredient(name = '', weight = '') {
    ingredientCount++;
    const id = ingredientCount;
    const container = document.getElementById('ingredientsList');
    const div = document.createElement('div');
    div.className = 'flex gap-2 items-center';
    div.id = `ing${id}`;
    div.innerHTML = `
        <input type="text" placeholder="原料名称" value="${name}" class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm ing-name">
        <input type="text" placeholder="克重" value="${weight}" class="w-24 border border-gray-200 rounded-xl px-3 py-2 text-sm ing-weight">
        <button onclick="document.getElementById('ing${id}').remove()" class="text-red-400 hover:text-red-600 text-sm px-2"><i class="fas fa-times-circle"></i></button>
    `;
    container.appendChild(div);
}

function getIngredients() {
    const items = [];
    document.querySelectorAll('#ingredientsList > div').forEach(div => {
        const n = div.querySelector('.ing-name')?.value?.trim();
        const w = div.querySelector('.ing-weight')?.value?.trim();
        if (n) items.push({ name: n, weight: w || '50' });
    });
    return items;
}

// ========== 产品列表 ==========
async function loadProducts() {
    const list = document.getElementById('productList');
    try {
        const resp = await fetch(`${API_BASE}/api/web/products`);
        const data = await resp.json();
        if (data.success && data.products && data.products.length > 0) {
            document.getElementById('productCount').textContent = data.products.length;
            list.innerHTML = data.products.map(p => {
                const statusLabel = p.status === 'draft' ? '草稿' : p.status === 'testing' ? '测试中' : '已发布';
                const statusColor = p.status === 'draft' ? 'bg-gray-100 text-gray-600' : p.status === 'testing' ? 'bg-amber-50 text-amber-600' : 'bg-green-50 text-green-600';
                return `
                <div class="product-item px-5 py-4 cursor-pointer" onclick="editProduct(${p.id})">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                            <div class="font-semibold text-gray-800 text-sm">${p.name}</div>
                            <div class="text-xs text-gray-500 mt-0.5">${p.recipe_name || '未关联配方'}</div>
                        </div>
                        <div class="flex items-center gap-2 flex-shrink-0">
                            <span class="text-xs px-2 py-0.5 rounded-full ${statusColor}">${statusLabel}</span>
                            <button onclick="event.stopPropagation(); deleteProduct(${p.id})" class="text-red-400 hover:text-red-600 text-sm"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } else {
            document.getElementById('productCount').textContent = '0';
            list.innerHTML = '<div class="text-center text-gray-400 py-8"><i class="fas fa-box-open text-3xl mb-2"></i><p class="text-sm">暂无产品，点击"新建"开始</p></div>';
        }
    } catch (e) {
        list.innerHTML = '<div class="text-center text-red-400 py-8">加载失败</div>';
    }
}

// ========== 表单 ==========
function showProductForm(product = null) {
    document.getElementById('analyzeResult').classList.add('hidden');
    if (product) {
        document.getElementById('formTitle').textContent = '编辑产品';
        document.getElementById('editProductId').value = product.id;
        document.getElementById('productName').value = product.name || '';
        document.getElementById('recipeName').value = product.recipe_name || '';
        document.getElementById('cookingMethod').value = product.cooking_method || '';
        document.getElementById('labData').value = product.lab_data || '';
        document.getElementById('productStatus').value = product.status || 'draft';
        const ings = typeof product.ingredients === 'string' ? JSON.parse(product.ingredients || '[]') : (product.ingredients || []);
        document.getElementById('ingredientsList').innerHTML = '';
        ingredientCount = 0;
        ings.forEach(ing => {
            const n = typeof ing === 'string' ? ing : (ing.name || '');
            const w = typeof ing === 'object' ? (ing.weight || '') : '';
            addIngredient(n, w);
        });
        const imps = typeof product.improvements === 'string' ? JSON.parse(product.improvements || '[]') : (product.improvements || []);
        currentImprovements = imps;
        currentSummary = product.summary || '';
        if (imps.length || product.summary) {
            showAnalyzeResult(imps, product.summary);
        }
    } else {
        document.getElementById('formTitle').textContent = '新建产品';
        document.getElementById('editProductId').value = '';
        document.getElementById('productName').value = '';
        document.getElementById('recipeName').value = '';
        document.getElementById('cookingMethod').value = '';
        document.getElementById('labData').value = '';
        document.getElementById('productStatus').value = 'draft';
        document.getElementById('ingredientsList').innerHTML = '';
        ingredientCount = 0;
        currentImprovements = [];
        currentSummary = '';
    }
    addIngredient();
}

// ========== AI分析 ==========
async function analyzeProduct() {
    const rn = document.getElementById('recipeName').value.trim();
    const cm = document.getElementById('cookingMethod').value.trim();
    const ld = document.getElementById('labData').value.trim();
    const ings = getIngredients();

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>分析中...';

    try {
        const formData = new FormData();
        formData.append('recipe_name', rn);
        formData.append('cooking_method', cm);
        formData.append('lab_data', ld);
        formData.append('ingredients', JSON.stringify(ings));
        const resp = await fetch(`${API_BASE}/api/web/product/analyze`, { method: 'POST', body: formData });
        const data = await resp.json();
        if (data.success) {
            currentImprovements = data.improvements || [];
            currentSummary = data.summary || '';
            showAnalyzeResult(data.improvements, data.summary);
        } else {
            alert('分析失败');
        }
    } catch (e) {
        alert('网络错误，请重试');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-brain mr-2"></i>AI分析优化建议';
    }
}

function showAnalyzeResult(improvements, summary) {
    document.getElementById('analyzeResult').classList.remove('hidden');
    const list = document.getElementById('improvementsList');
    if (improvements && improvements.length) {
        list.innerHTML = improvements.map(imp => `
            <div class="improvement-card bg-gray-50 rounded-xl p-4">
                <div class="font-semibold text-gray-800 text-sm mb-1"><i class="fas fa-arrow-right text-sky-500 mr-2"></i>${imp.title}</div>
                <div class="text-sm text-gray-600 leading-relaxed">${imp.description}</div>
            </div>
        `).join('');
    }
    const sBox = document.getElementById('summaryBox');
    if (summary) {
        sBox.innerHTML = `<div class="flex items-start gap-2"><i class="fas fa-clipboard-check text-sky-500 mt-0.5"></i><span>${summary}</span></div>`;
    }
}

// ========== 保存产品 ==========
async function saveProduct() {
    const name = document.getElementById('productName').value.trim();
    if (!name) { alert('请填写产品名称'); return; }

    const productData = {
        name: name,
        recipe_name: document.getElementById('recipeName').value.trim(),
        cooking_method: document.getElementById('cookingMethod').value.trim(),
        ingredients: getIngredients(),
        lab_data: document.getElementById('labData').value.trim(),
        improvements: currentImprovements,
        summary: currentSummary,
        status: document.getElementById('productStatus').value
    };

    try {
        const editId = document.getElementById('editProductId').value;
        let resp;
        if (editId) {
            resp = await fetch(`${API_BASE}/api/web/products/${editId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });
        } else {
            resp = await fetch(`${API_BASE}/api/web/products`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(productData)
            });
        }
        const data = await resp.json();
        if (data.success) {
            alert('保存成功！');
            await loadProducts();
        } else {
            alert('保存失败：' + (data.error || '未知错误'));
        }
    } catch (e) {
        alert('网络错误，请重试');
    }
}

// ========== 编辑产品 ==========
async function editProduct(id) {
    try {
        const resp = await fetch(`${API_BASE}/api/web/products/${id}`);
        const data = await resp.json();
        if (data.success && data.product) {
            showProductForm(data.product);
        }
    } catch (e) { alert('网络错误'); }
}

// ========== 删除产品 ==========
async function deleteProduct(id) {
    if (!confirm('确定要删除这个产品吗？')) return;
    try {
        const resp = await fetch(`${API_BASE}/api/web/products/${id}`, { method: 'DELETE' });
        const data = await resp.json();
        if (data.success) { await loadProducts(); }
        else { alert('删除失败'); }
    } catch (e) { alert('网络错误'); }
}

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', () => {
    loadProducts();
    addIngredient();
});
</script>
</body>
</html>
