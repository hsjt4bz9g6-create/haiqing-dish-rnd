<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海青产品研发 - AI配方分析</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --primary:#0f766e;--primary-light:#14b8a6;--primary-dark:#0d5f59;
    --accent:#f59e0b;--accent-light:#fbbf24;
    --bg:#f0fdfa;--bg-card:#ffffff;--bg-dark:#042f2e;
    --text:#1e293b;--text-light:#64748b;--text-white:#f0fdfa;
    --border:#e2e8f0;--shadow:0 4px 24px rgba(15,118,110,.08);
    --radius:16px;--radius-sm:10px;
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .navbar{background:linear-gradient(135deg,var(--bg-dark) 0%,#0a3d3a 100%);padding:0 32px;height:72px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.15)}
  .nav-brand{display:flex;align-items:center;gap:14px}
  .nav-logo{width:42px;height:42px;background:linear-gradient(135deg,var(--primary-light),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700}
  .nav-title{color:#fff;font-size:20px;font-weight:700;letter-spacing:1px}
  .nav-subtitle{color:rgba(240,253,250,.6);font-size:12px;margin-top:2px}
  .nav-tabs{display:flex;gap:6px}
  .nav-tab{padding:10px 24px;border-radius:var(--radius-sm);color:rgba(240,253,250,.7);font-size:14px;font-weight:500;cursor:pointer;transition:all .25s;border:none;background:transparent;text-decoration:none}
  .nav-tab:hover{color:#fff;background:rgba(255,255,255,.08)}
  .nav-tab.active{color:#fff;background:var(--primary);font-weight:600}

  .container{max-width:1200px;margin:0 auto;padding:28px 32px}

  .card{background:var(--bg-card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(15,118,110,.06);overflow:hidden;transition:transform .2s,box-shadow .2s}
  .card:hover{box-shadow:0 8px 32px rgba(15,118,110,.12)}
  .card-header{padding:22px 28px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-header-left{display:flex;align-items:center;gap:12px}
  .card-icon{width:38px;height:38px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px}
  .card-icon.product{background:linear-gradient(135deg,#fce7f3,#fbcfe8);color:#db2777}
  .card-title{font-size:17px;font-weight:700;color:var(--text)}
  .card-body{padding:24px 28px}

  .main-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-top:4px}

  .btn{padding:9px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;border:none;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(15,118,110,.25)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-accent:hover{background:#d97706;transform:translateY(-1px)}
  .btn-outline{background:transparent;color:var(--primary);border:1.5px solid var(--primary)}
  .btn-outline:hover{background:rgba(15,118,110,.05)}

  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
  .form-label .required{color:#ef4444;margin-left:2px}
  .form-input,.form-textarea,.form-select{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:#fff;transition:all .2s;outline:none;font-family:inherit}
  .form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(20,184,166,.1)}
  .form-textarea{resize:vertical;min-height:90px;line-height:1.6}
  .form-input::placeholder,.form-textarea::placeholder{color:#94a3b8}

  .file-upload{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:28px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa}
  .file-upload:hover{border-color:var(--primary-light);background:rgba(15,118,110,.02)}
  .file-upload-icon{font-size:32px;margin-bottom:8px;opacity:.5}
  .file-upload-text{font-size:13px;color:var(--text-light)}
  .file-upload input{display:none}

  .ingredient-list{display:flex;flex-direction:column;gap:8px}
  .ingredient-row{display:flex;gap:8px;align-items:center}
  .ingredient-row .form-input{flex:1}
  .btn-remove{width:32px;height:32px;border-radius:8px;border:1.5px solid #fecaca;background:#fef2f2;color:#ef4444;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .btn-remove:hover{background:#ef4444;color:#fff}
  .btn-add{padding:8px 16px;border-radius:8px;border:1.5px dashed var(--primary-light);background:transparent;color:var(--primary);font-size:13px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
  .btn-add:hover{background:rgba(15,118,110,.05);border-color:var(--primary)}

  .result-section{margin-top:24px;padding-top:24px;border-top:1px solid var(--border)}
  .improvement-card{padding:18px 20px;background:linear-gradient(135deg,#f0fdfa,#ecfdf5);border-radius:var(--radius-sm);border-left:4px solid var(--primary-light);margin-bottom:14px;transition:all .2s}
  .improvement-card:hover{transform:translateX(4px);box-shadow:0 2px 12px rgba(15,118,110,.1)}
  .improvement-title{font-size:15px;font-weight:700;color:var(--primary-dark);margin-bottom:8px}
  .improvement-desc{font-size:13px;color:var(--text-light);line-height:1.7}
  .summary-box{padding:20px 24px;background:linear-gradient(135deg,#fef3c7,#fde68a);border-radius:var(--radius-sm);margin-top:20px;border:1px solid #fcd34d}
  .summary-title{font-size:14px;font-weight:700;color:#92400e;margin-bottom:8px}
  .summary-text{font-size:13px;color:#78350f;line-height:1.7}

  .loading{text-align:center;padding:40px;color:var(--text-light);font-size:14px}
  .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty-state{text-align:center;padding:48px 20px;color:var(--text-light)}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4}
  .empty-text{font-size:14px}

  @media(max-width:900px){
    .main-grid{grid-template-columns:1fr}
    .navbar{padding:0 16px;height:64px}
    .container{padding:20px 16px}
    .nav-subtitle{display:none}
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo">🐟</div>
    <div>
      <div class="nav-title">海青菜品研发工作台</div>
      <div class="nav-subtitle">大连海青水产有限公司 · 深海鱼加工及预制菜品研发</div>
    </div>
  </div>
  <div class="nav-tabs">
    <a class="nav-tab" href="/">菜品研发</a>
    <a class="nav-tab active" href="/product.html">产品研发</a>
  </div>
</nav>

<div class="container">
  <div class="main-grid">

    <!-- 左：配方输入 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-icon product">🧪</div>
          <div class="card-title">AI配方分析</div>
        </div>
      </div>
      <div class="card-body">
        <form id="productForm" onsubmit="analyzeProduct(event)">
          <div class="form-group">
            <label class="form-label">菜品/配方名称<span class="required">*</span></label>
            <input class="form-input" id="recipeName" placeholder="例如：香煎鳕鱼" required>
          </div>
          <div class="form-group">
            <label class="form-label">烹饪方式</label>
            <select class="form-select" id="cookingMethod">
              <option value="煎">煎</option>
              <option value="蒸">蒸</option>
              <option value="煮">煮</option>
              <option value="烤">烤</option>
              <option value="炸">炸</option>
              <option value="炖">炖</option>
              <option value="炒">炒</option>
              <option value="拌">拌</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">原料配方</label>
            <div class="ingredient-list" id="ingredientList">
              <div class="ingredient-row">
                <input class="form-input" placeholder="例如：鳕鱼 200g">
                <button type="button" class="btn-remove" onclick="removeIngredient(this)">×</button>
              </div>
            </div>
            <button type="button" class="btn-add" onclick="addIngredient()" style="margin-top:8px">+ 添加原料</button>
          </div>
          <div class="form-group">
            <label class="form-label">实验室数据</label>
            <textarea class="form-textarea" id="labData" placeholder="例如：蛋白质含量18.5g/100g，脂肪含量3.2g/100g"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">上传参考文档</label>
            <div class="file-upload" onclick="document.getElementById('docFile').click()">
              <div class="file-upload-icon">📄</div>
              <div class="file-upload-text">点击上传参考文档（PDF/Word/Excel）</div>
              <input type="file" id="docFile" accept=".pdf,.doc,.docx,.xls,.xlsx">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">上传产品照片</label>
            <div class="file-upload" onclick="document.getElementById('photoFiles').click()">
              <div class="file-upload-icon">📷</div>
              <div class="file-upload-text">点击上传产品照片（支持多张）</div>
              <input type="file" id="photoFiles" accept="image/*" multiple>
            </div>
          </div>
          <button type="submit" class="btn btn-accent" style="width:100%;justify-content:center;padding:13px;font-size:15px">
            🔬 AI配方分析与优化
          </button>
        </form>
      </div>
    </div>

    <!-- 右：分析结果 -->
    <div class="card">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-icon product">📋</div>
          <div class="card-title">分析结果</div>
        </div>
      </div>
      <div class="card-body">
        <div id="analysisResult">
          <div class="empty-state">
            <div class="empty-icon">🧪</div>
            <div class="empty-text">填写左侧配方信息后，点击「AI配方分析与优化」</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const API_BASE = "https://haiqing-dish-rnd-production.up.railway.app";

function addIngredient() {
  const list = document.getElementById('ingredientList');
  const row = document.createElement('div');
  row.className = 'ingredient-row';
  row.innerHTML = '<input class="form-input" placeholder="例如：黄油 20g"><button type="button" class="btn-remove" onclick="removeIngredient(this)">×</button>';
  list.appendChild(row);
}

function removeIngredient(btn) {
  const list = document.getElementById('ingredientList');
  if (list.children.length > 1) btn.parentElement.remove();
}

async function analyzeProduct(e) {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  const resultDiv = document.getElementById('analysisResult');
  btn.disabled = true;
  btn.textContent = '⏳ 分析中...';
  resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><br>AI正在分析配方，请稍候...</div>';

  const recipeName = document.getElementById('recipeName').value;
  const cookingMethod = document.getElementById('cookingMethod').value;
  const labData = document.getElementById('labData').value;

  const ingredientInputs = document.querySelectorAll('#ingredientList .form-input');
  const ingredients = Array.from(ingredientInputs).map(i => i.value).filter(v => v.trim());

  const formData = new FormData();
  formData.append('recipe_name', recipeName);
  formData.append('cooking_method', cookingMethod);
  formData.append('lab_data', labData);
  formData.append('ingredients', JSON.stringify(ingredients));

  const docFile = document.getElementById('docFile').files[0];
  if (docFile) formData.append('document', docFile);

  const photoFiles = document.getElementById('photoFiles').files;
  for (let i = 0; i < photoFiles.length; i++) {
    formData.append('photos', photoFiles[i]);
  }

  try {
    const resp = await fetch(`${API_BASE}/api/web/product/analyze`, {
      method: 'POST',
      body: formData
    });
    const data = await resp.json();

    if (data.success) {
      let html = '<div class="result-section">';
      if (data.improvements && data.improvements.length > 0) {
        data.improvements.forEach(imp => {
          html += `<div class="improvement-card">
            <div class="improvement-title">💡 ${imp.title}</div>
            <div class="improvement-desc">${imp.description}</div>
          </div>`;
        });
      }
      if (data.summary) {
        html += `<div class="summary-box">
          <div class="summary-title">📝 总结</div>
          <div class="summary-text">${data.summary}</div>
        </div>`;
      }
      html += '</div>';
      resultDiv.innerHTML = html;
    } else {
      resultDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">分析失败，请重试</div></div>';
    }
  } catch (err) {
    resultDiv.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">网络错误，请重试</div></div>';
  } finally {
    btn.disabled = false;
    btn.textContent = '🔬 AI配方分析与优化';
  }
}
</script>
</body>
</html>
