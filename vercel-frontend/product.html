<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品研发 - 海青菜品研发工作台</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #7C3AED;
            --primary-light: #A78BFA;
            --primary-dark: #6D28D9;
            --primary-bg: #F5F3FF;
            --sidebar-bg: #0F172A;
            --sidebar-hover: #1E293B;
            --sidebar-active: #7C3AED;
            --bg: #F1F5F9;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --text-light: #94A3B8;
            --border: #E2E8F0;
            --danger: #EF4444;
            --danger-bg: #FEF2F2;
            --success: #10B981;
            --success-bg: #ECFDF5;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
            --radius: 10px;
        }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

        .sidebar {
            width: 240px; min-height: 100vh; background: var(--sidebar-bg);
            display: flex; flex-direction: column; position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
        }
        .sidebar-brand {
            padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 12px;
        }
        .sidebar-brand .logo {
            width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary-light), var(--primary));
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff; flex-shrink: 0;
        }
        .sidebar-brand .brand-text h1 { font-size: 15px; font-weight: 600; color: #F8FAFC; line-height: 1.3; }
        .sidebar-brand .brand-text p { font-size: 11px; color: var(--text-light); line-height: 1.3; margin-top: 2px; }
        .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
        .nav-section { margin-bottom: 24px; }
        .nav-section-title { font-size: 11px; font-weight: 600; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.05em; padding: 0 12px; margin-bottom: 8px; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px;
            color: #CBD5E1; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
            text-decoration: none; margin-bottom: 2px;
        }
        .nav-item:hover { background: var(--sidebar-hover); color: #F1F5F9; }
        .nav-item.active { background: var(--sidebar-active); color: #FFFFFF; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; opacity: 0.7; }
        .nav-item.active svg { opacity: 1; }
        .nav-badge { margin-left: auto; background: var(--danger); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 10px; }
        .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 12px; color: var(--text-light); }

        .main { flex: 1; margin-left: 240px; min-height: 100vh; }
        .topbar {
            background: var(--card); border-bottom: 1px solid var(--border); padding: 0 32px;
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .topbar-left { display: flex; align-items: center; gap: 16px; }
        .topbar-left h2 { font-size: 18px; font-weight: 600; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .topbar-btn {
            display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: none;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-outline:hover { background: var(--bg); color: var(--text); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }

        .content { padding: 24px 32px; }

        .data-card {
            background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow);
            border: 1px solid var(--border); overflow: hidden;
        }
        .data-card-header {
            padding: 16px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .data-card-header h3 { font-size: 15px; font-weight: 600; }
        .data-card-body { padding: 0; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600;
            color: var(--text-secondary); background: #F8FAFC; border-bottom: 1px solid var(--border);
        }
        tbody td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tbody tr:hover { background: #F8FAFC; }
        tbody tr:last-child td { border-bottom: none; }

        .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .tag-draft { background: #FEF3C7; color: #92400E; }
        .tag-published { background: var(--success-bg); color: #065F46; }
        .tag-testing { background: #DBEAFE; color: #1E40AF; }

        .action-btn {
            padding: 4px 10px; border-radius: 5px; font-size: 12px; cursor: pointer;
            border: 1px solid var(--border); background: #fff; color: var(--text-secondary);
            transition: all 0.15s; margin-right: 4px;
        }
        .action-btn:hover { background: var(--bg); color: var(--text); }
        .action-btn.danger { color: var(--danger); border-color: #FECACA; }
        .action-btn.danger:hover { background: var(--danger-bg); }

        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card); border-radius: 14px; width: 720px; max-height: 85vh;
            overflow-y: auto; box-shadow: var(--shadow-lg);
        }
        .modal-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-header h3 { font-size: 16px; font-weight: 600; }
        .modal-close { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; cursor: pointer; font-size: 18px; color: var(--text-secondary); }
        .modal-close:hover { background: var(--bg); }
        .modal-body { padding: 24px; }
        .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
        .form-group label .required { color: var(--danger); }
        .form-input {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; color: var(--text); background: #fff; font-family: inherit;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
        textarea.form-input { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.3; }
        .spinner {
            display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
            border-top-color: var(--primary); border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .improvement-card {
            background: var(--primary-bg); border: 1px solid #DDD6FE; border-radius: 10px;
            padding: 16px 20px; margin-bottom: 12px;
        }
        .improvement-card h4 { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
        .improvement-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

        .summary-box {
            background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 10px;
            padding: 16px 20px; margin-top: 16px;
        }
        .summary-box h4 { font-size: 14px; font-weight: 600; color: #92400E; margin-bottom: 8px; }
        .summary-box p { font-size: 13px; color: #78350F; line-height: 1.7; }

        .toast {
            position: fixed; top: 24px; right: 24px; z-index: 999; padding: 14px 20px;
            border-radius: 10px; font-size: 14px; font-weight: 500; color: #fff;
            box-shadow: var(--shadow-lg); transform: translateX(120%); transition: transform 0.3s;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card {
            background: var(--card); border-radius: var(--radius); padding: 20px 24px;
            box-shadow: var(--shadow); border: 1px solid var(--border);
        }
        .stat-card .stat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .stat-card .stat-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .stat-card .stat-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-card .stat-value { font-size: 28px; font-weight: 700; line-height: 1; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand">
        <div class="logo">🐟</div>
        <div class="brand-text">
            <h1>海青水产</h1>
            <p>菜品研发工作台</p>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">
            <div class="nav-section-title">概览</div>
            <a class="nav-item" href="/index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                工作台首页
            </a>
        </div>
        <div class="nav-section">
            <div class="nav-section-title">研发管理</div>
            <a class="nav-item" href="/index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
                菜品研发
            </a>
            <a class="nav-item" href="/index.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                社媒洞察
            </a>
            <a class="nav-item active" href="/product.html">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/><circle cx="12" cy="12" r="3"/></svg>
                产品研发
            </a>
        </div>
    </nav>
    <div class="sidebar-footer">© 2026 大连海青水产有限公司</div>
</aside>

<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <h2>产品研发</h2>
        </div>
        <div class="topbar-right">
            <button class="topbar-btn btn-primary" onclick="openProductModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新建产品
            </button>
        </div>
    </header>

    <div class="content">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">产品总数</span>
                    <div class="stat-icon" style="background:#F5F3FF;color:var(--primary)">📦</div>
                </div>
                <div class="stat-value" id="stat-products">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">研发中</span>
                    <div class="stat-icon" style="background:#DBEAFE;color:#3B82F6">🔬</div>
                </div>
                <div class="stat-value" id="stat-testing">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <span class="stat-label">已定型</span>
                    <div class="stat-icon" style="background:var(--success-bg);color:var(--success)">✅</div>
                </div>
                <div class="stat-value" id="stat-published">0</div>
            </div>
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <div style="display:flex;gap:8px;">
                <input type="text" class="form-input" placeholder="搜索产品..." style="width:260px;" id="product-search" oninput="loadProducts()">
            </div>
        </div>

        <div class="data-card">
            <div class="data-card-body">
                <table>
                    <thead>
                        <tr><th>产品名称</th><th>配方名</th><th>工艺</th><th>状态</th><th>更新时间</th><th style="width:160px">操作</th></tr>
                    </thead>
                    <tbody id="product-list">
                        <tr><td colspan="6" class="empty-state"><div class="es-icon">📦</div><p>暂无产品，点击「新建产品」开始</p></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 产品弹窗 -->
<div class="modal-overlay" id="product-modal">
    <div class="modal" style="width:760px;">
        <div class="modal-header">
            <h3 id="product-modal-title">新建产品</h3>
            <button class="modal-close" onclick="closeProductModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="product-id">
            <div class="form-row">
                <div class="form-group">
                    <label>产品名称 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="product-name" placeholder="例如：深海鳕鱼预制菜">
                </div>
                <div class="form-group">
                    <label>配方名称</label>
                    <input type="text" class="form-input" id="product-recipe" placeholder="关联配方名称">
                </div>
            </div>

            <div class="form-group">
                <label>原料配比 <span class="required">*</span></label>
                <div id="ingredient-list">
                    <div class="form-row ingredient-row" style="margin-bottom:10px;">
                        <div class="form-group" style="margin-bottom:0">
                            <input type="text" class="form-input" placeholder="原料名称，如：鳕鱼" style="width:48%;display:inline-block;">
                            <input type="text" class="form-input" placeholder="克重，如：200g" style="width:38%;display:inline-block;margin-left:2%;">
                        </div>
                    </div>
                </div>
                <button class="btn-outline btn-sm" style="margin-top:8px;" onclick="addIngredient()">+ 添加原料</button>
            </div>

            <div class="form-group">
                <label>研发工艺 <span class="required">*</span></label>
                <textarea class="form-input" id="product-method" placeholder="详细描述产品加工工艺流程..."></textarea>
            </div>

            <div class="form-group">
                <label>实验数据</label>
                <textarea class="form-input" id="product-lab" placeholder="录入实验室检测数据、营养成分检测结果等..." style="min-height:100px;"></textarea>
            </div>

            <div style="display:flex;gap:10px;margin-top:20px;">
                <button class="topbar-btn btn-primary" onclick="analyzeProduct()" id="btn-analyze">
                    🔬 AI配方分析
                </button>
                <button class="topbar-btn btn-outline" onclick="saveProduct('draft')">保存草稿</button>
                <button class="topbar-btn btn-outline" onclick="saveProduct('published')" style="color:var(--success);border-color:var(--success);">定型发布</button>
            </div>

            <!-- 分析结果 -->
            <div id="product-result" style="display:none;margin-top:24px;">
                <div style="border-top:1px solid var(--border);padding-top:20px;">
                    <h4 style="font-size:15px;font-weight:600;margin-bottom:16px;color:var(--primary);">📋 AI分析报告</h4>
                    <div id="improvement-list"></div>
                    <div class="summary-box" id="product-summary"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = "https://haiqing-dish-rnd-production.up.railway.app";

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + (type || 'success') + ' show';
    setTimeout(() => t.classList.remove('show'), 3000);
}

function formatDate(d) {
    if (!d) return '-';
    return new Date(d).toLocaleDateString('zh-CN', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// ========== 产品CRUD ==========
async function loadProducts() {
    const search = document.getElementById('product-search').value;
    try {
        const resp = await fetch(API_BASE + '/api/web/products');
        const data = await resp.json();
        if (!data.success) return;
        let products = data.products || [];
        if (search) products = products.filter(p => p.name.includes(search));

        document.getElementById('stat-products').textContent = data.products ? data.products.length : 0;
        document.getElementById('stat-testing').textContent = data.products ? data.products.filter(p=>p.status!=='published').length : 0;
        document.getElementById('stat-published').textContent = data.products ? data.products.filter(p=>p.status==='published').length : 0;

        const tbody = document.getElementById('product-list');
        if (products.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><div class="es-icon">📦</div><p>暂无产品数据</p></td></tr>';
            return;
        }
        tbody.innerHTML = products.map(p => `
            <tr>
                <td style="font-weight:600;">${p.name}</td>
                <td>${p.recipe_name || '-'}</td>
                <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.cooking_method || '-'}</td>
                <td><span class="tag tag-${p.status}">${p.status==='published'?'已定型':'研发中'}</span></td>
                <td style="font-size:12px;color:var(--text-light);">${formatDate(p.updated_at)}</td>
                <td>
                    <button class="action-btn" onclick="editProduct(${p.id})">编辑</button>
                    <button class="action-btn" onclick="viewReport(${p.id})">报告</button>
                    <button class="action-btn danger" onclick="deleteProduct(${p.id})">删除</button>
                </td>
            </tr>
        `).join('');
    } catch(e) { console.error(e); }
}

function openProductModal(product) {
    document.getElementById('product-modal-title').textContent = product ? '编辑产品' : '新建产品';
    document.getElementById('product-id').value = product ? product.id : '';
    document.getElementById('product-name').value = product ? product.name : '';
    document.getElementById('product-recipe').value = product ? product.recipe_name || '' : '';
    document.getElementById('product-method').value = product ? product.cooking_method || '' : '';
    document.getElementById('product-lab').value = product ? product.lab_data || '' : '';
    document.getElementById('product-result').style.display = 'none';

    document.getElementById('ingredient-list').innerHTML = `
        <div class="form-row ingredient-row" style="margin-bottom:10px;">
            <div class="form-group" style="margin-bottom:0">
                <input type="text" class="form-input" placeholder="原料名称，如：鳕鱼" style="width:48%;display:inline-block;">
                <input type="text" class="form-input" placeholder="克重，如：200g" style="width:38%;display:inline-block;margin-left:2%;">
            </div>
        </div>`;

    if (product && product.ingredients) {
        try {
            const ings = typeof product.ingredients === 'string' ? JSON.parse(product.ingredients) : product.ingredients;
            if (Array.isArray(ings) && ings.length > 0) {
                document.getElementById('ingredient-list').innerHTML = ings.map(ing =>
                    `<div class="form-row ingredient-row" style="margin-bottom:10px;">
                        <div class="form-group" style="margin-bottom:0">
                            <input type="text" class="form-input" placeholder="原料名称" style="width:48%;display:inline-block;" value="${ing.name||''}">
                            <input type="text" class="form-input" placeholder="克重" style="width:38%;display:inline-block;margin-left:2%;" value="${ing.weight||''}">
                            <button class="action-btn danger" onclick="this.closest('.ingredient-row').remove()" style="margin-left:4px;">删</button>
                        </div>
                    </div>`
                ).join('');
            }
        } catch(e) {}
    }

    document.getElementById('product-modal').classList.add('show');
}

function closeProductModal() {
    document.getElementById('product-modal').classList.remove('show');
}

function addIngredient() {
    const list = document.getElementById('ingredient-list');
    list.insertAdjacentHTML('beforeend', `
        <div class="form-row ingredient-row" style="margin-bottom:10px;">
            <div class="form-group" style="margin-bottom:0">
                <input type="text" class="form-input" placeholder="原料名称" style="width:48%;display:inline-block;">
                <input type="text" class="form-input" placeholder="克重" style="width:38%;display:inline-block;margin-left:2%;">
                <button class="action-btn danger" onclick="this.closest('.ingredient-row').remove()" style="margin-left:4px;">删</button>
            </div>
        </div>`);
}

function collectIngredients() {
    const rows = document.querySelectorAll('.ingredient-row');
    const ings = [];
    rows.forEach(row => {
        const inputs = row.querySelectorAll('.form-input');
        if (inputs.length >= 2) {
            const name = inputs[0].value.trim();
            const weight = inputs[1].value.trim();
            if (name) ings.push({name, weight});
        }
    });
    return ings;
}

async function analyzeProduct() {
    const name = document.getElementById('product-name').value.trim();
    const method = document.getElementById('product-method').value.trim();
    if (!name || !method) { showToast('请填写产品名称和工艺', 'error'); return; }

    const btn = document.getElementById('btn-analyze');
    btn.disabled = true; btn.textContent = '分析中...';

    const ings = collectIngredients();

    try {
        const formData = new FormData();
        formData.append('recipe_name', name);
        formData.append('cooking_method', method);
        formData.append('ingredients', JSON.stringify(ings));
        formData.append('lab_data', document.getElementById('product-lab').value);

        const resp = await fetch(API_BASE + '/api/web/product/analyze', { method: 'POST', body: formData });
        const data = await resp.json();

        if (data.success) {
            document.getElementById('product-result').style.display = 'block';

            const impDiv = document.getElementById('improvement-list');
            if (data.improvements && data.improvements.length > 0) {
                impDiv.innerHTML = data.improvements.map(imp =>
                    `<div class="improvement-card">
                        <h4>${imp.title}</h4>
                        <p>${imp.description}</p>
                    </div>`
                ).join('');
            }

            if (data.summary) {
                document.getElementById('product-summary').innerHTML = `<h4>📋 综合评估</h4><p>${data.summary}</p>`;
            }

            showToast('分析完成！');
        }
    } catch(e) {
        showToast('分析失败：' + e.message, 'error');
    }
    btn.disabled = false; btn.textContent = '🔬 AI配方分析';
}

async function saveProduct(status) {
    const name = document.getElementById('product-name').value.trim();
    if (!name) { showToast('请填写产品名称', 'error'); return; }

    const ings = collectIngredients();
    const impDiv = document.getElementById('improvement-list');
    const improvements = [];
    impDiv.querySelectorAll('.improvement-card').forEach(card => {
        improvements.push({
            title: card.querySelector('h4')?.textContent || '',
            description: card.querySelector('p')?.textContent || ''
        });
    });

    const summaryText = document.getElementById('product-summary')?.querySelector('p')?.textContent || '';

    const body = {
        name: name,
        recipe_name: document.getElementById('product-recipe').value.trim(),
        cooking_method: document.getElementById('product-method').value.trim(),
        ingredients: ings,
        lab_data: document.getElementById('product-lab').value.trim(),
        improvements: improvements,
        summary: summaryText,
        status: status
    };

    try {
        const id = document.getElementById('product-id').value;
        const url = id ? API_BASE + '/api/web/products/' + id : API_BASE + '/api/web/products';
        const resp = await fetch(url, {
            method: id ? 'PUT' : 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        const data = await resp.json();
        if (data.success) {
            showToast(status === 'published' ? '产品已定型发布！' : '草稿已保存！');
            closeProductModal();
            loadProducts();
        } else { showToast('保存失败', 'error'); }
    } catch(e) { showToast('保存失败：' + e.message, 'error'); }
}

async function editProduct(id) {
    try {
        const resp = await fetch(API_BASE + '/api/web/products/' + id);
        const data = await resp.json();
        if (data.success && data.product) openProductModal(data.product);
    } catch(e) { showToast('加载失败', 'error'); }
}

async function viewReport(id) {
    try {
        const resp = await fetch(API_BASE + '/api/web/products/' + id);
        const data = await resp.json();
        if (data.success && data.product) {
            openProductModal(data.product);
            if (data.product.improvements || data.product.summary) {
                document.getElementById('product-result').style.display = 'block';
                const ings = typeof data.product.improvements === 'string' ? JSON.parse(data.product.improvements || '[]') : (data.product.improvements || []);
                document.getElementById('improvement-list').innerHTML = ings.map(imp =>
                    `<div class="improvement-card"><h4>${imp.title||''}</h4><p>${imp.description||''}</p></div>`
                ).join('');
                if (data.product.summary) {
                    document.getElementById('product-summary').innerHTML = `<h4>📋 综合评估</h4><p>${data.product.summary}</p>`;
                }
            }
        }
    } catch(e) { showToast('加载失败', 'error'); }
}

async function deleteProduct(id) {
    if (!confirm('确定删除该产品？')) return;
    try {
        await fetch(API_BASE + '/api/web/products/' + id, { method: 'DELETE' });
        showToast('已删除');
        loadProducts();
    } catch(e) { showToast('删除失败', 'error'); }
}

loadProducts();
</script>
</body>
</html>
